server:
  port: ${SERVER_PORT:9007}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

integracion:
  solicitud:
    # URL base sin barra final (solicitud-service por defecto en 9003).
    base-url: ${INTEGRACION_SOLICITUD_BASE_URL:http://127.0.0.1:9003}
    connect-timeout: 5s
    read-timeout: 10s

spring:
  application:
    name: product-service
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:products;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
