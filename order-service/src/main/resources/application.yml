server:
  port: ${SERVER_PORT:9006}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orders;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# Parámetros de la cadena decorada de precios (Decorator)
order:
  pricing:
    tax-rate: 0.19
    shipping-flat: 5.00
