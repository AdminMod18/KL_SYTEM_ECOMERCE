# Stack completo: PostgreSQL + microservicios (comunicación por nombre de servicio, sin localhost interno).
# Uso: docker compose up --build
#
# Endpoints desde el host: localhost:9001..9009 y admin 9010 según mapeo de puertos.

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: kl_user
      POSTGRES_PASSWORD: kl_pass
      POSTGRES_DB: kl_db
    ports:
      - "5432:5432"
    volumes:
      - kl_pgdata:/var/lib/postgresql/data
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kl_user -d kl_db"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "9001:9001"
    environment:
      SERVER_PORT: "9001"
      AUTH_JWT_SECRET: "docker-jwt-secret-minimo-32-caracteres-seguros!!"
      USER_SERVICE_BASE_URL: "http://user-service:9002"
      USER_SERVICE_INTERNAL_SECRET: "kl-internal-verificar-credenciales-docker"
      INTEGRACION_SOLICITUD_BASE_URL: "http://solicitud-service:9003"
    depends_on:
      user-service:
        condition: service_healthy
      solicitud-service:
        condition: service_healthy
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9001/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "9002:9002"
    environment:
      SERVER_PORT: "9002"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: kl_db
      DB_USER: kl_user
      DB_PASSWORD: kl_pass
      USER_SERVICE_INTERNAL_SECRET: "kl-internal-verificar-credenciales-docker"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9002/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  validation-service:
    build:
      context: ./validation-service
      dockerfile: Dockerfile
    container_name: validation-service
    ports:
      - "9004:9004"
    environment:
      SERVER_PORT: "9004"
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9004/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "9005:9005"
    environment:
      SERVER_PORT: "9005"
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9005/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  solicitud-service:
    build:
      context: ./solicitud-service
      dockerfile: Dockerfile
    container_name: solicitud-service
    ports:
      - "9003:9003"
    environment:
      SERVER_PORT: "9003"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: kl_db
      DB_USER: kl_user
      DB_PASSWORD: kl_pass
      INTEGRACION_VALIDATION_BASE_URL: http://validation-service:9004
      INTEGRACION_PAYMENT_BASE_URL: http://payment-service:9005
      INTEGRACION_NOTIFICATION_BASE_URL: http://notification-service:9008
      INTEGRACION_ADMIN_BASE_URL: http://admin-service:9010
      USER_SERVICE_BASE_URL: http://user-service:9002
      USER_SERVICE_INTERNAL_SECRET: "kl-internal-verificar-credenciales-docker"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      validation-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9003/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "9006:9006"
    environment:
      SERVER_PORT: "9006"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: kl_db
      DB_USER: kl_user
      DB_PASSWORD: kl_pass
      ORDER_PRICING_COMMISSION_RATE: "0.05"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9006/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "9007:9007"
    environment:
      SERVER_PORT: "9007"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: kl_db
      DB_USER: kl_user
      DB_PASSWORD: kl_pass
      INTEGRACION_SOLICITUD_BASE_URL: http://solicitud-service:9003
    depends_on:
      postgres:
        condition: service_healthy
      solicitud-service:
        condition: service_healthy
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9007/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "9008:9008"
    environment:
      SERVER_PORT: "9008"
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9008/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "9009:9009"
    environment:
      SERVER_PORT: "9009"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: kl_db
      DB_USER: kl_user
      DB_PASSWORD: kl_pass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9009/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    ports:
      - "9010:9010"
    environment:
      SERVER_PORT: "9010"
    networks:
      - kl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9010/v3/api-docs > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

networks:
  kl-net:
    driver: bridge

volumes:
  kl_pgdata:
